<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>근로계약서 연봉 계산기</title>
    <style>
        :root {
            --primary-color: #4733FF;
            --bg-color: #f4f5f7;
            --card-bg: #ffffff;
            --text-main: #333333;
            --text-muted: #666666;
            --border-color: #e0e0e0;
            --danger-color: #ff3b3b;
            --suggest-color: #00b894;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, 'Helvetica Neue', sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        /* 전체 카드 넓이와 안쪽 여백을 넓혀서 시원하게 배치 */
        .calculator-card {
            background-color: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 550px; 
            padding: 40px; 
            box-sizing: border-box;
        }

        .header {
            text-align: center;
            margin-bottom: 28px;
        }

        /* 글씨 크기는 원래의 깔끔한 크기로 복구 */
        .header h1 {
            color: var(--primary-color);
            font-size: 22px; 
            margin: 0 0 8px 0;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .info-box {
            background-color: rgba(71, 51, 255, 0.05);
            border: 1px solid rgba(71, 51, 255, 0.2);
            border-radius: 8px;
            padding: 16px 20px;
            margin-bottom: 28px;
            font-size: 13px;
            color: var(--primary-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 10px;
        }

        .input-wrapper {
            position: relative;
        }

        /* 입력창 상하 여백을 늘려 클릭 영역 확보 */
        .input-wrapper input {
            width: 100%;
            padding: 16px 45px 16px 18px; 
            font-size: 18px;
            font-weight: 700;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
            text-align: right;
            color: var(--text-main);
        }

        .input-wrapper input:focus {
            border-color: var(--primary-color);
        }

        .input-wrapper .unit {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-weight: 500;
            font-size: 15px;
        }

        .message-box {
            font-size: 13px;
            margin-top: 12px;
            display: none;
            font-weight: 500;
            line-height: 1.5;
            padding: 12px;
            border-radius: 6px;
        }

        .warning {
            color: var(--danger-color);
            background-color: #fff0f0;
        }

        .suggestion {
            color: #00896f;
            background-color: #e6f8f5;
        }

        .suggestion .apply-btn {
            display: inline-block;
            margin-top: 8px;
            padding: 6px 12px;
            background-color: var(--suggest-color);
            color: white;
            border-radius: 4px;
            text-decoration: none;
            font-size: 12px;
            cursor: pointer;
            border: none;
            font-weight: 600;
        }

        .suggestion .apply-btn:hover {
            background-color: #00a080;
        }

        .result-section {
            border-top: 2px dashed var(--border-color);
            padding-top: 28px;
            margin-top: 28px;
        }

        .result-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .result-row.main {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 28px;
        }

        .result-row.main .value {
            color: var(--primary-color);
            font-size: 22px;
        }

        .composition-title {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 14px;
        }

        /* 각 결과 행의 안쪽 여백을 넓혀서 답답하지 않게 조절 */
        .sub-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 18px; 
            background-color: #f9fafb;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .sub-row .label {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-main);
        }

        .sub-row .desc {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 6px;
            line-height: 1.4;
        }

        .sub-row .value {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-main);
            text-align: right;
        }

        /* 복사 버튼 스타일 (클릭하기 편하게 여백만 살짝 늘림) */
        .copy-btn {
            background-color: #ffffff;
            color: var(--text-muted);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 4px 10px; 
            font-size: 11px;
            cursor: pointer;
            margin-left: 10px;
            transition: all 0.2s;
            font-weight: 600;
        }

        .copy-btn:hover {
            background-color: var(--primary-color);
            color: #ffffff;
            border-color: var(--primary-color);
        }

        .copy-btn.copied {
            background-color: var(--suggest-color);
            color: #ffffff;
            border-color: var(--suggest-color);
        }

        .flex-center {
            display: flex;
            align-items: center;
        }
    </style>
</head>
<body>

<div class="calculator-card">
    <div class="header">
        <h1>근로계약서 연봉 계산기</h1>
    </div>

    <div class="info-box">
        <span id="yearLabel">당해연도 최저임금 (시급)</span>
        <span id="minWageDisplay">- 원</span>
    </div>

    <div class="form-group">
        <label for="totalSalary">총 연봉 (직접 입력)</label>
        <div class="input-wrapper">
            <input type="text" id="totalSalary" placeholder="0" oninput="handleInput(this)">
            <span class="unit">원</span>
        </div>
        <div class="message-box suggestion" id="suggestionText"></div>
        <div class="message-box warning" id="warningText"></div>
    </div>

    <div class="result-section">
        <div class="result-row main">
            <span>월급여 (세전)</span>
            <span class="value" id="monthlySalary">0원</span>
        </div>

        <div class="composition-title">임금 구성</div>
        
        <div class="sub-row">
            <div>
                <div class="label">기본급</div>
                <div class="desc">월급에서 식대와 수당을 제외한 금액</div>
            </div>
            <div class="flex-center">
                <div class="value" id="basePay">0원</div>
                <button class="copy-btn" onclick="copyText('basePay', this)">복사</button>
            </div>
        </div>

        <div class="sub-row">
            <div>
                <div class="label">연장근로수당</div>
                <div class="flex-center" style="margin-top: 4px;">
                    <div class="desc" id="otDesc" style="margin-top: 0;">연봉에 따라 자동 적용</div>
                    <button class="copy-btn" onclick="copyText('otDesc', this)">복사</button>
                </div>
            </div>
            <div class="flex-center">
                <div class="value" id="overtimePay">0원</div>
                <button class="copy-btn" onclick="copyText('overtimePay', this)">복사</button>
            </div>
        </div>

        <div class="sub-row">
            <div>
                <div class="label">식대</div>
                <div class="desc">비과세 고정 (월 20만 원)</div>
            </div>
            <div class="value" id="mealAllowance">200,000원</div>
        </div>
    </div>
</div>

<script>
    const minWageData = {
        2024: { hourly: 9860, monthly: 2060740 },
        2025: { hourly: 10030, monthly: 2096270 },
        2026: { hourly: 10320, monthly: 2156880 }
    };

    const currentYear = new Date().getFullYear();
    const currentMinWage = minWageData[currentYear] || minWageData[2026]; 
    const minHourlyWage = currentMinWage.hourly;

    document.getElementById('yearLabel').innerText = `${currentYear}년 최저시급`;
    document.getElementById('minWageDisplay').innerText = minHourlyWage.toLocaleString() + '원';

    function handleInput(input) {
        let value = input.value.replace(/[^0-9]/g, '');
        if (value) {
            input.value = Number(value).toLocaleString();
        } else {
            input.value = '';
        }
        calculate();
    }

    function applySuggestedSalary(suggestedValue) {
        const inputEl = document.getElementById('totalSalary');
        inputEl.value = Number(suggestedValue).toLocaleString();
        calculate();
    }

    // 텍스트 복사 함수 (원 제거 및 서식 없는 텍스트 복사)
    function copyText(elementId, btnElement) {
        let textToCopy = document.getElementById(elementId).innerText;
        
        // 끝에 '원'이 포함되어 있으면 제거 (공백도 함께 다듬음)
        textToCopy = textToCopy.replace(/원$/, '').trim();
        
        // 브라우저의 클립보드 API는 서식 없는 단순 텍스트만 복사합니다.
        navigator.clipboard.writeText(textToCopy).then(() => {
            const originalText = btnElement.innerText;
            btnElement.innerText = '복사완료!';
            btnElement.classList.add('copied');
            
            // 1.5초 후 원래 상태로 복구
            setTimeout(() => {
                btnElement.innerText = originalText;
                btnElement.classList.remove('copied');
            }, 1500);
        }).catch(err => {
            alert('복사에 실패했습니다. 브라우저 설정을 확인해주세요.');
            console.error(err);
        });
    }

    function calculate() {
        const salaryInput = document.getElementById('totalSalary').value.replace(/,/g, '');
        const totalSalary = parseInt(salaryInput) || 0;

        const warningEl = document.getElementById('warningText');
        const suggestionEl = document.getElementById('suggestionText');

        if (totalSalary === 0) {
            document.getElementById('monthlySalary').innerText = '0원';
            document.getElementById('basePay').innerText = '0원';
            document.getElementById('overtimePay').innerText = '0원';
            document.getElementById('otDesc').innerText = '연봉에 따라 자동 적용';
            warningEl.style.display = 'none';
            suggestionEl.style.display = 'none';
            return;
        }

        if (totalSalary % 12000 !== 0) {
            const rawMonthly = totalSalary / 12;
            const suggestedMonthly = Math.ceil(rawMonthly / 1000) * 1000;
            const suggestedTotal = suggestedMonthly * 12;

            suggestionEl.style.display = 'block';
            suggestionEl.innerHTML = `💡 <b>깔끔한 계산 가이드</b><br>월급여가 1,000원 단위로 떨어지도록 <b>${suggestedTotal.toLocaleString()}원</b>으로 올림해 보세요.<br>
            <button class="apply-btn" onclick="applySuggestedSalary(${suggestedTotal})">이 금액 적용하기</button>`;
        } else {
            suggestionEl.style.display = 'none';
        }

        const monthlySalary = Math.floor(totalSalary / 12);
        const mealAllowance = 200000;

        let otHours = 72;
        let otDescText = "월 48시간 x 150% = 월 72시간";

        if (totalSalary <= 30000000) {
            otHours = 30;
            otDescText = "월 20시간 x 150% = 월 30시간";
        }

        const totalCalcHours = 209 + otHours;
        const hourlyRate = monthlySalary / totalCalcHours; 

        // 역산 순서 (식대, 수당 먼저 계산 후 기본급 도출)
        const overtimePay = Math.floor(hourlyRate * otHours);
        const basePay = monthlySalary - mealAllowance - overtimePay;

        document.getElementById('monthlySalary').innerText = monthlySalary.toLocaleString() + '원';
        document.getElementById('basePay').innerText = basePay.toLocaleString() + '원';
        document.getElementById('overtimePay').innerText = overtimePay.toLocaleString() + '원';
        document.getElementById('otDesc').innerText = otDescText;

        const ordinaryHourlyWage = Math.floor(hourlyRate);
        
        if (ordinaryHourlyWage < minHourlyWage) {
            warningEl.style.display = 'block';
            warningEl.innerHTML = `🚨 <b>최저임금 미달 알림</b><br>산정된 통상시급(${ordinaryHourlyWage.toLocaleString()}원)이 당해년도 최저시급(${minHourlyWage.toLocaleString()}원)에 미달합니다. 연봉을 상향 조정해 주세요.`;
        } else {
            warningEl.style.display = 'none';
        }
    }
</script>

</body>
</html>
